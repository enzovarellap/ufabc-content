name: Deploy GitHub Pages

# Publica o dashboard (index.html) + Disciplinas/ no GitHub Pages via Actions
# (em vez do modo "Deploy from branch"). Gera o manifest.json na hora do
# deploy, então não depende de nenhum commit automático de volta ao
# repositório — elimina a corrida entre dois deployments simultâneos que
# causava "Deployment failed, try again later" no modo antigo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# cancel-in-progress: false -> deployments enfileiram em vez de cancelar um
# ao outro (cancelar um deployment em andamento é o que gerava a falha
# intermitente da API do Pages).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Gerar manifest.json
        run: python scripts/gen_manifest.py
      - name: Remover .git do artefato
        run: rm -rf .git
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
